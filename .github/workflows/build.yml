name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macOS ARM64
            artifact_name: Audio-DNA-macOS-ARM64
            artifact_path: build/AudioDNA_artefacts/Release/Audio-DNA.app
          - os: macos-15
            name: macOS x86_64
            artifact_name: Audio-DNA-macOS-x86_64
            artifact_path: build/AudioDNA_artefacts/Release/Audio-DNA.app
          - os: ubuntu-22.04
            name: Linux GCC
            artifact_name: Audio-DNA-Linux
            artifact_path: build/AudioDNA_artefacts/Release/Audio-DNA
          - os: windows-latest
            name: Windows MSVC
            artifact_name: Audio-DNA-Windows
            artifact_path: build/AudioDNA_artefacts/Release

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Aubio (macOS)
        if: runner.os == 'macOS'
        run: brew install aubio

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libaubio-dev \
            libasound2-dev \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libwebkit2gtk-4.0-dev \
            libglu1-mesa-dev \
            mesa-common-dev

      - name: Install Aubio (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install aubio:x64-windows
          echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" >> $env:GITHUB_ENV

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run Tests
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Bundle Aubio (macOS)
        if: runner.os == 'macOS'
        run: |
          APP="${{ matrix.artifact_path }}"
          mkdir -p "$APP/Contents/Frameworks"
          AUBIO=$(otool -L "$APP/Contents/MacOS/Audio-DNA" | grep aubio | awk '{print $1}')
          cp "$AUBIO" "$APP/Contents/Frameworks/"
          install_name_tool -change "$AUBIO" "@executable_path/../Frameworks/libaubio.5.dylib" "$APP/Contents/MacOS/Audio-DNA"
          codesign --force --deep --sign - "$APP"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 30
