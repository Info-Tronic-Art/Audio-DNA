name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macOS ARM64
            artifact_name: Audio-DNA-macOS-ARM64
            artifact_path: build/AudioDNA_artefacts/Release/Audio-DNA.app
            cache_key: macos-arm64
          - os: macos-15
            name: macOS x86_64
            artifact_name: Audio-DNA-macOS-x86_64
            artifact_path: build/AudioDNA_artefacts/Release/Audio-DNA.app
            cache_key: macos-x86
          - os: ubuntu-22.04
            name: Linux GCC
            artifact_name: Audio-DNA-Linux
            artifact_path: build/AudioDNA_artefacts/Release/Audio-DNA
            cache_key: linux-gcc
          - os: windows-latest
            name: Windows MSVC
            artifact_name: Audio-DNA-Windows
            artifact_path: build/AudioDNA_artefacts/Release
            cache_key: windows-msvc

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      # === Cache: JUCE build objects + vcpkg (saves ~15-20 min per build) ===
      - name: Cache build objects
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            build/CMakeFiles
            build/AudioDNA_artefacts
            build/tests
          key: ${{ matrix.cache_key }}-build-${{ hashFiles('CMakeLists.txt', 'tests/CMakeLists.txt', 'src/**') }}
          restore-keys: |
            ${{ matrix.cache_key }}-build-

      - name: Cache vcpkg packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/packages
          key: vcpkg-aubio-x64-windows-v1
          restore-keys: vcpkg-aubio-

      # === Install dependencies ===
      - name: Install Aubio (macOS)
        if: runner.os == 'macOS'
        run: brew install aubio

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libaubio-dev \
            libasound2-dev \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libglu1-mesa-dev \
            mesa-common-dev
          # Install whichever webkit2gtk version is available
          sudo apt-get install -y libwebkit2gtk-4.1-dev 2>/dev/null || \
            sudo apt-get install -y libwebkit2gtk-4.0-dev

      - name: Install Aubio (Windows)
        if: runner.os == 'Windows'
        run: |
          if (!(Test-Path "C:/vcpkg/installed/x64-windows/lib/aubio.lib")) {
            vcpkg install aubio:x64-windows
          } else {
            Write-Host "Aubio already cached, skipping install"
          }

      # === Configure & Build ===
      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Configure CMake
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run Tests
        continue-on-error: true
        run: ctest --test-dir build --build-config Release --output-on-failure

      # === Bundle & Upload ===
      - name: Bundle Aubio (macOS)
        if: runner.os == 'macOS'
        run: |
          APP="${{ matrix.artifact_path }}"
          rm -rf "$APP/Contents/Frameworks"
          mkdir -p "$APP/Contents/Frameworks"
          AUBIO=$(otool -L "$APP/Contents/MacOS/Audio-DNA" | grep aubio | awk '{print $1}')
          cp "$AUBIO" "$APP/Contents/Frameworks/"
          install_name_tool -change "$AUBIO" "@executable_path/../Frameworks/libaubio.5.dylib" "$APP/Contents/MacOS/Audio-DNA"
          codesign --force --deep --sign - "$APP"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 30
